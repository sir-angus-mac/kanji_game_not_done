            /* Fade properties */

            visibility: hidden;

        #word-popup-header {

        /* Circle/Oval shaped buttons with a protruding shadow effect */

<script>
function getBaseKana(char) {
    if (!char) return "";
    
    // 1. Convert Full-width Katakana to Hiragana using Unicode offset mapping
    let code = char.charCodeAt(0);
    if (code >= 0x30A1 && code <= 0x30F6) {
        char = String.fromCharCode(code - 0x60);
    }

    // 2. Map small (sutegana) Hiragana to standard large forms
    const smallToLarge = {
        'ぁ': 'あ', 'ぃ': 'い', 'ぅ': 'う', 'ぇ': 'え', 'ぉ': 'お',
        'っ': 'つ',
        'ゃ': 'や', 'ゅ': 'ゆ', 'ょ': 'よ',
        'ゎ': 'わ'
    };
    
    let base = smallToLarge[char] || char;
    
    // 3. RETURNING THE BASE DIRECTLY (Keeping Dakuten/Handakuten intact)
    // We remove the .normalize('NFD').replace(...) strip regex lines
    return base;
} 

function showWordPopup(kanjiChar) {
    if (systemSpawnInterval) {
        clearInterval(systemSpawnInterval);
        systemSpawnInterval = null;
    }

    const overlay = document.getElementById('word-popup-overlay');
    const header = document.getElementById('word-popup-header');
    const content = document.getElementById('word-popup-content');
    
    // Clear header except the close button
    const closeBtn = document.getElementById('word-popup-close');
    header.innerHTML = ''; 
    
    // Create clickable Kanji title element
    const titleSpan = document.createElement('span');
    titleSpan.id = 'word-popup-title';
    titleSpan.className = 'kanji-header-clickable';
    titleSpan.innerText = kanjiChar;
    titleSpan.title = "Click to toggle readings!";
    
    // Add Toggle click listener to Title Text 
    titleSpan.addEventListener('click', () => {
        document.body.classList.toggle('show-yomikata');
    });

    // Add Toggle touch listener to Title Text (Mobile/Touchpads)
    titleSpan.addEventListener('touchend', (e) => {
        e.preventDefault();  // Stop default tap delay behaviors
        e.stopPropagation(); // Stop the touch event from bubbling to the canvas underneath
        document.body.classList.toggle('show-yomikata');
    });
    
    header.appendChild(titleSpan);
    header.appendChild(closeBtn); // Put the close button back safely
    
    content.innerHTML = ''; 
    
    const vocabList = kanjiDataDictionary[kanjiChar] || [];
    
    if (vocabList.length === 0) {
        content.innerHTML = `<div class="no-words-msg">No words recorded.</div>`;
    } else {
        vocabList.forEach(item => {
            const displayWord = item[0];
            const yomikataReading = item[1] || ""; // Grab the reading index from dictionary entry
            
            const wordDiv = document.createElement('div');
            wordDiv.className = 'word-item';
            
            // Flex wrapper inside item
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = 'word-item-wrapper';
            
            const linkSpan = document.createElement('span');
            linkSpan.className = 'word-clickable-link';
            linkSpan.innerText = displayWord;
            
            // Interaction animations/draw order link rules
            linkSpan.addEventListener('click', (e) => {
                e.stopPropagation();
                openStrokeTeaching(displayWord);
            });
            linkSpan.addEventListener('touchend', (e) => {
                e.preventDefault();
                e.stopPropagation();
                openStrokeTeaching(displayWord);
            });

            // Add the yomikata element directly underneath
            const readingSpan = document.createElement('span');
            readingSpan.className = 'word-yomikata';
            readingSpan.innerText = yomikataReading;

            wrapperDiv.appendChild(linkSpan);
            wrapperDiv.appendChild(readingSpan);
            wordDiv.appendChild(wrapperDiv);
            content.appendChild(wordDiv);
        });
    }
    
    overlay.style.display = 'flex';
    overlay.classList.add('ui-popup-active');
} 

function closeWordPopup() {
    // Smooth Fade-Out
    document.getElementById('word-popup-overlay').classList.remove('ui-popup-active');

    if (!systemSpawnInterval) {
        systemSpawnInterval = setInterval(spawnRandomSystemKanji, 10000);
    } 
} 

let systemSpawnInterval = null;

// Stroke Order Animation Orchestrator State Variables
let teachingWordString = "";
let teachingCharIndex = 0;
let teachingAnimationId = null;
let currentStrokeIndex = 0;
let currentPointIndex = 0;
let transitionTimeoutId = null; 

let isCuttingMode = false;
let cutStartPoint = null;
let cutEndPoint = null; 



function openStrokeTeaching(wordString) {
    if (systemSpawnInterval) {
        clearInterval(systemSpawnInterval);
        systemSpawnInterval = null;
        console.log("[Sandbox Engine] System spawn timer stopped for study session.");
    }

    // 1. Smoothly fade OUT the underlying word dictionary list UI
    const wordOverlay = document.getElementById('word-popup-overlay');
    if (wordOverlay) {
        wordOverlay.classList.remove('ui-popup-active');
    }

    teachingWordString = wordString;
    teachingCharIndex = 0;

    // 2. Smoothly fade IN the drawing animation panel UI
    const teachingPopup = document.getElementById('stroke-teaching-popup');
    if (teachingPopup) {
        teachingPopup.classList.add('ui-popup-active');
    }

    loadCharacterAnimation();  
} 

function closeStrokeTeaching() { 
    // 1. Smoothly fade OUT the drawing animation panel UI
    const teachingPopup = document.getElementById('stroke-teaching-popup');
    if (teachingPopup) {
        teachingPopup.classList.remove('ui-popup-active');
    }
    
    if (teachingAnimationId) {
        cancelAnimationFrame(teachingAnimationId);
        teachingAnimationId = null;
    }
    if (transitionTimeoutId) {
        clearTimeout(transitionTimeoutId);
        transitionTimeoutId = null;
    }

    // 2. Smoothly bring the word dictionary list UI right back up!
    const wordOverlay = document.getElementById('word-popup-overlay');
    if (wordOverlay) {
        wordOverlay.classList.add('ui-popup-active');
    }
    console.log("[Sandbox Engine] Animation closed; returning focus back to open Word List panel.");
} 

function loadCharacterAnimation() {
    if (teachingAnimationId) {
        cancelAnimationFrame(teachingAnimationId);
        teachingAnimationId = null;
    }
    if (transitionTimeoutId) {
        clearTimeout(transitionTimeoutId);
        transitionTimeoutId = null;
    }

    const canvas = document.getElementById('stroke-teaching-canvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (teachingCharIndex >= teachingWordString.length) {
        closeStrokeTeaching();
        return;
    }

    // Dynamic step counter logic removed from here

    // Dynamically update the Weblio anchor link tag with the current full word context string
    const weblioBtn = document.getElementById('weblio-lookup-btn');
    if (weblioBtn) {
        weblioBtn.href = `https://www.weblio.jp/content/${encodeURIComponent(teachingWordString)}`;
    }

    const currentChar = teachingWordString[teachingCharIndex];
    const patternMatch = KanjiCanvas.refPatterns.find(p => p[0] === currentChar);
    
    if (!patternMatch || !patternMatch[2] || patternMatch[2].length === 0) {
        ctx.fillStyle = "#111111";
        ctx.font = "64px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(currentChar, canvas.width / 2, canvas.height / 2 + 20);
        
        transitionTimeoutId = setTimeout(() => {
            moveToNextCharacterOrClose();
        }, 800);
        return;
    }

    const structuralStrokes = patternMatch[2];
    currentStrokeIndex = 0;
    currentPointIndex = 0;

    animateStrokeOrder(ctx, canvas, structuralStrokes);
}  

function animateStrokeOrder(ctx, canvas, strokes) {
    let lastTime = 0;
    const speedDelay = 2; 
    
    function step(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const elapsed = timestamp - lastTime;

        if (elapsed > speedDelay) {
            lastTime = timestamp;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#e5e7eb";
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.moveTo(0, canvas.height / 2); ctx.lineTo(canvas.width / 2, canvas.height / 2);
            ctx.stroke();
            ctx.setLineDash([]);

            for (let i = 0; i < currentStrokeIndex; i++) {
                ctx.strokeStyle = KanjiCanvas.strokeColors[i % KanjiCanvas.strokeColors.length];
                ctx.lineWidth = 5;
                ctx.strokeCap = "round";
                ctx.strokeJoin = "round";
                ctx.beginPath();
                strokes[i].forEach((pt, idx) => {
                    let tx = (pt[0] / 256) * (canvas.width - 20) + 10;
                    let ty = (pt[1] / 256) * (canvas.height - 20) + 10;
                    if (idx === 0) ctx.moveTo(tx, ty);
                    else ctx.lineTo(tx, ty);
                });
                ctx.stroke();
            }

            if (currentStrokeIndex < strokes.length) {
                const currentStroke = strokes[currentStrokeIndex];
                ctx.strokeStyle = KanjiCanvas.strokeColors[currentStrokeIndex % KanjiCanvas.strokeColors.length];
                ctx.lineWidth = 6;
                ctx.strokeCap = "round";
                ctx.strokeJoin = "round";
                ctx.beginPath();

                for (let j = 0; j <= currentPointIndex; j++) {
                    let tx = (currentStroke[j][0] / 256) * (canvas.width - 20) + 10;
                    let ty = (currentStroke[j][1] / 256) * (canvas.height - 20) + 10;
                    if (j === 0) ctx.moveTo(tx, ty);
                    else ctx.lineTo(tx, ty);
                }
                ctx.stroke();

                currentPointIndex += 3; 
                if (currentPointIndex >= currentStroke.length) {
                    currentStrokeIndex++;
                    currentPointIndex = 0;
                }
            } else {
                cancelAnimationFrame(teachingAnimationId);
                teachingAnimationId = null;

                transitionTimeoutId = setTimeout(() => {
                    moveToNextCharacterOrClose();
                }, 900);
                return;
            }
        }
        teachingAnimationId = requestAnimationFrame(step);
    }
    
    teachingAnimationId = requestAnimationFrame(step);
}

function moveToNextCharacterOrClose() {
    teachingCharIndex++;
    if (teachingCharIndex >= teachingWordString.length) {
        closeStrokeTeaching();
    } else {
        loadCharacterAnimation();
    }
}

function replayCurrentCharacter() {
    loadCharacterAnimation();
}

function nextCharacterInWord() {
    moveToNextCharacterOrClose();
} 


function handleDragMove(currentX, currentY) {
    if (!selectedBlock || !selectedBlock.body) return;

    // 1. Maintain horizontal movement
    selectedBlock.dragX(currentX);

    // 2. Calculate the real-time distance between your finger and the moving block
    // If the finger is higher than the block, body.position.y is greater than currentY,
    // making deltaY POSITIVE (meaning grow). If the finger goes below, deltaY becomes NEGATIVE.
    const deltaY = selectedBlock.body.position.y - currentY;

    // Print the live distance to your console
    console.log("Live distance from block center to cursor Y:", deltaY.toFixed(2) + "px");

    // 3. Scale Sensitivity Setup

                Matter.Body.setVelocity(slashedBlock.body, { x: 0, y: 0 });
                Matter.Body.setAngularVelocity(slashedBlock.body, 0);
            }

            // --- GEOMETRIC VECTOR CLIPPING ---
            // We define a diagonal cutting line: x + y = 256 (Bottom-Left to Top-Right)
            if (slashedBlock.jsonStrokes) {
                let newSlicedStrokes = [];

                slashedBlock.jsonStrokes.forEach(strokeObj => {
                    let points = strokeObj.path || strokeObj;
                    let isAppended = strokeObj.isAppended || false;

                    if (points.length < 2) {
                        // Point is too small to slice, just assign it to a side
                        let pt = points[0];
                        let side = (pt[0] + pt[1] < 256) ? -1 : 1;
                        newSlicedStrokes.push({ path: points, splitSide: side, isAppended: isAppended });
                        return;
                    }

                    let currentPath = [];
                    // Check which side of the diagonal the first point starts on
                    let currentSide = (points[0][0] + points[0][1] < 256) ? -1 : 1;
                    currentPath.push(points[0]);

                    for (let j = 1; j < points.length; j++) {
                        let p1 = points[j-1];
                        let p2 = points[j];
                        
                        let side1 = (p1[0] + p1[1] < 256) ? -1 : 1;
                        let side2 = (p2[0] + p2[1] < 256) ? -1 : 1;

                        if (side1 !== side2) {
                            // The stroke crossed the diagonal! Calculate the exact intersection pixel.
                            let dx = p2[0] - p1[0];
                            let dy = p2[1] - p1[1];
                            let denominator = dx + dy;
                            
                            if (Math.abs(denominator) > 0.001) {
                                // Linear interpolation to find the crossing point (t)
                                let t = (256 - p1[0] - p1[1]) / denominator;
                                let intersectX = p1[0] + (t * dx);
                                let intersectY = p1[1] + (t * dy);
                                let intersectPt = [intersectX, intersectY];

                                // 1. Cap off the current stroke at the intersection
                                currentPath.push(intersectPt);
                                newSlicedStrokes.push({ path: currentPath, splitSide: currentSide, isAppended: isAppended });

                                // 2. Start a brand new stroke on the other side of the cut
                                currentPath = [intersectPt, p2];
                                currentSide = side2;
                            } else {
                                currentPath.push(p2);
                            }
                        } else {
                            // Line segment didn't cross the cut, keep building the path
                            currentPath.push(p2);
                        }
                    }
                    
                    // Push the final remaining chunk of the stroke
                    if (currentPath.length > 0) {
                        newSlicedStrokes.push({ path: currentPath, splitSide: currentSide, isAppended: isAppended });
                    }
                });

                // Overwrite the original drawing matrix with our newly multiplied, sliced strokes!
                slashedBlock.jsonStrokes = newSlicedStrokes;
            }

            console.log("⏱️ Vector geometries clipped! Drifting halves for 2 seconds...");
            isCuttingMode = false;
            cutStartPoint = null;
            cutEndPoint = null;
        } 

        return false; // Prevent default drawing actions safely
    }

    // Your original default block drag/drawing setup remains below...
    if (selectedBlock) {
        pointerX = clientX;
        pointerY = clientY;
    }
});

function convexHull(points) {
  points = points.map(p => ({x: p[0], y: p[1]}));
  points.sort((a, b) => a.x === b.x ? a.y - b.y : a.x - b.x);

  const cross = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);

  const lower = [];
  for (let p of points) {
    while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
    lower.push(p);
  }

  const upper = [];
  for (let i = points.length - 1; i >= 0; i--) {
    let p = points[i];
    while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) upper.pop();
    upper.push(p);
  }

  upper.pop(); lower.pop();
  return lower.concat(upper);
}

class SlashedPiece {
    constructor(x, y, singleStrokeObj, angle, parentWidth, parentHeight, parentScale) {
        this.strokeObj = singleStrokeObj; 
        this.drawnWidth = parentWidth;
        this.drawnHeight = parentHeight;
        this.scale = parentScale;
        this.spawnTime = millis(); 

        // Extract raw points array from layout properties
        let points = this.strokeObj.path || this.strokeObj;
        
        // --- 1. CALCULATE LOCAL STROKE MIDPOINT CENTROID ---
        let totalLocalX = 0;
        let totalLocalY = 0;
        let count = points.length;

        points.forEach(vertexPoint => {
            let lx = (vertexPoint[0] - 128) * (this.drawnWidth / 256) * 1.6;
            let ly = (vertexPoint[1] - 128) * (this.drawnHeight / 256);
            totalLocalX += lx;
            totalLocalY += ly;
        });

        this.centerXOffset = count > 0 ? totalLocalX / count : 0;
        this.centerYOffset = count > 0 ? totalLocalY / count : 0;

        let cosA = cos(angle);
        let sinA = sin(angle);
        let worldXOffset = this.centerXOffset * cosA - this.centerYOffset * sinA;
        let worldYOffset = this.centerXOffset * sinA + this.centerYOffset * cosA;

        // --- 2. CREATE A TINY CIRCLULAR PHYSICAL BODY ---
        let spawnX = x + worldXOffset;
        let spawnY = y + worldYOffset;
        let circleRadius = 10 * (this.scale || 1.0);

        this.body = Matter.Bodies.circle(spawnX, spawnY, circleRadius, {
            frictionAir: 0.02, // Loosened up slightly so they glide a bit further
            restitution: 0.6,   // Just enough bounce to react sharply to impacts
            angle: angle
        });
        
        // --- 3. THE "GOLDILOCKS" EXPLOSION BLAST ---
        // Tuned to 0.09 for a punchy, satisfying pop
        let forceMagnitude = 0.09 * this.body.mass; 
        let angleDir = random(TWO_PI);
        Matter.Body.applyForce(this.body, this.body.position, {
            x: cos(angleDir) * forceMagnitude,
            y: sin(angleDir) * forceMagnitude
        });
        
        // Moderate spinning speeds for an active, tumbling look
        Matter.Body.setAngularVelocity(this.body, random(-0.35, 0.35));
        
        Matter.Composite.add(engine.world, this.body);
    }

    display() {
        if (!this.body) return;
        
        push();
        translate(this.body.position.x, this.body.position.y);
        rotate(this.body.angle);
        
        stroke(0, 0, 0);  
        strokeWeight(4); 
        noFill();
        
        let points = this.strokeObj.path || this.strokeObj; 
        if (Array.isArray(points)) {
            beginShape();
            points.forEach(vertexPoint => {
                let localX = (vertexPoint[0] - 128) * (this.drawnWidth / 256) * 1.6;
                let localY = (vertexPoint[1] - 128) * (this.drawnHeight / 256);
                vertex(localX - this.centerXOffset, localY - this.centerYOffset);
            });
            endShape();
        }
        pop();
    }
}

    this.isReadingMode = false;      // True when it turns grey 

    let allPoints = playerStrokes.flat();
    if (allPoints.length === 0) return;

    let minX = Infinity, maxX = -Infinity;
    let minY = Infinity, maxY = -Infinity;
    allPoints.forEach(pt => {
      if (pt[0] < minX) minX = pt[0]; if (pt[0] > maxX) maxX = pt[0];
      if (pt[1] < minY) minY = pt[1]; if (pt[1] > maxY) maxY = pt[1];
    });

    this.drawnWidth = Math.max(maxX - minX, 40);
    this.drawnHeight = Math.max(maxY - minY, 40);
    this.internalStrokeRotation = Math.atan2(maxY - minY, maxX - minX) - Math.PI / 4;

    this.verticalSuspensionOffset = 0;

    let hull = convexHull(allPoints);
    let cx = hull.reduce((s, p) => s + p.x, 0) / hull.length;
    let cy = hull.reduce((s, p) => s + p.y, 0) / hull.length;

    let hMinX = Infinity, hMaxX = -Infinity;
    let hMaxY = -Infinity, hMinY = Infinity;
    hull.forEach(p => {
      if (p.x < hMinX) hMinX = p.x; if (p.x > hMaxX) hMaxX = p.x;
      if (p.y < hMinY) hMinY = p.y; if (p.y > hMaxY) hMaxY = p.y;
    });
    let hullW = hMaxX - hMinX;
    let hullH = hMaxY - hMinY;

    let autoShrinkX = hullW > 0 ? (this.drawnWidth / hullW) * 0.88 : 1;
    let autoShrinkY = hullH > 0 ? (this.drawnHeight / hullH) * 0.88 : 1;
    let masterTightFitScale = Math.min(autoShrinkX, autoShrinkY);

    let verts = hull.map(p => ({
      x: (p.x - cx) * masterTightFitScale,
      y: (p.y - cy) * masterTightFitScale
    }));

    this.body = Matter.Bodies.fromVertices(x, y, verts, {
      friction: 0.8,
      restitution: 0.2
    }, true);

    Matter.Composite.add(engine.world, this.body);
  }

  containsPoint(px, py) {
    return Matter.Vertices.contains(this.body.vertices, { x: px, y: py });
  }

  suspend() {
    if (this.hasLanded) return;
    if (this.isSuspended) return;
    
    this.isSuspended = true;
    let targetSuspensionY = this.body.position.y + this.verticalSuspensionOffset;
    Matter.Body.setPosition(this.body, { x: this.body.position.x, y: targetSuspensionY });
    Matter.Body.setVelocity(this.body, { x: 0, y: 0 });
    Matter.Body.setAngularVelocity(this.body, 0);
    Matter.Body.setAngle(this.body, 0); 
  }

  release() {
    this.isSuspended = false;
    Matter.Sleeping.set(this.body, false);
  }

  dragX(targetX) {
    if (this.hasLanded) return;
    let clampedX = Math.max(30, Math.min(targetX, windowWidth - 30));
    Matter.Body.setPosition(this.body, { x: clampedX, y: this.body.position.y });
    Matter.Body.setVelocity(this.body, { x: 0, y: 0 });
    Matter.Body.setAngularVelocity(this.body, 0); 

    if (this.body) {
        Matter.Body.setPosition(this.body, { x: targetX, y: this.body.position.y });
    }
  }

  scaleBody(scaleMultiplier) {
        if (!this.body) return;

        // 1. Establish absolute scale boundaries
        const minScaleLimit = 0.4;
        const maxScaleLimit = 2.5;

        // Support whichever property name your code uses (blockScale vs scale)
        let currentScale = this.blockScale !== undefined ? this.blockScale : (this.scale || 1.0);
        let projectedScale = currentScale * scaleMultiplier;

        // 2. Only perform scaling operations if it fits within safe limits
        if (projectedScale >= minScaleLimit && projectedScale <= maxScaleLimit) {
            
            // Sync up all potential rendering metric properties used by your draw routine
            if (this.blockScale !== undefined) this.blockScale = projectedScale;
            if (this.scale !== undefined) this.scale = projectedScale;
            
            // Scale dimensional bounds if tracked
            if (this.drawnWidth) this.drawnWidth *= scaleMultiplier;
            if (this.drawnHeight) this.drawnHeight *= scaleMultiplier;
            if (this.w) this.w *= scaleMultiplier;
            if (this.h) this.h *= scaleMultiplier;

            // 3. Scale the underlying Matter.js physics engine structural vertices
            Matter.Body.scale(this.body, scaleMultiplier, scaleMultiplier);
        }
    }

  display() { 
        let pos = this.body.position;
        let angle = this.body.angle;

        // 1. Render Hull Perimeter Outline Wireframe
        // Only draw this perimeter wireframe box if the object is NOT preparing to explode!

        let makeBoundingBoxesVisible = false; // *** Trigger for DEBUGGING!!!! 

        if (!this.isTriggeredForExplosion && makeBoundingBoxesVisible) {
            push();
            if (this.isRed) {
                this.displayText = "斬";
                fill(255, 0, 0); // Bright Red 
                stroke(255, 0, 0);
            } else if (this.isSystemSpawn) {
                stroke(60, 60, 60); 
            } else {
                stroke(168, 85, 247);  
            }
            strokeWeight(2);
            noFill();
            beginShape();
            this.body.vertices.forEach(v => { vertex(v.x, v.y); });
            endShape(CLOSE);
            pop();
        }

        // 2. Render Suspension Guide
        // --- FIX: Prevent the horizontal guide line from drawing when the character is slashed/exploding! ---
        if (this.isSuspended && !this.isTriggeredForExplosion) {
        push();
        stroke(255, 255, 255, 140); 
        strokeWeight(2);
        drawingContext.setLineDash([6, 6]); 
        line(0, pos.y, windowWidth, pos.y);
        pop();
        }

        if (!this.hasLanded && pos.y + (this.drawnHeight / 2) >= (windowHeight - 35)) {
            this.hasLanded = true;
        }

        // 3. Render Canvas Vector Font Glyphs
        push();
        translate(pos.x, pos.y);
        rotate(angle);
        rotate(this.internalStrokeRotation); 

        strokeWeight(10); 
        strokeCap(ROUND);
        strokeJoin(ROUND);
        noFill();

        const totalChars = this.img.length;
        let xScaleMultiplier = 1.6;

        if (totalChars <= 1) {
            // --- Single Character Layout --- 
            this.jsonStrokes.forEach(strokeObj => {
                let points = strokeObj.path || strokeObj;
                if (!Array.isArray(points)) return;

                if (this.isTriggeredForExplosion) {

                } else if (this.isRed) {
                    stroke(255, 0, 0);
                } else if (strokeObj.isAppended) {
                    stroke(120, 120, 120); 
                } else if (this.isSystemSpawn) {
                    stroke(0); 
                } else {
                    stroke(255); 
                }

                // 1. Add this near the top of display(), before the beginShape loops:
                let splitDrift = 0; 
                if (this.isTriggeredForExplosion) {
                    let elapsed = millis() - this.explosionTimerStart;
                    // Pushes them up to 35 pixels apart smoothly over the 2000ms duration
                    splitDrift = map(min(elapsed, 2000), 0, 2000, 0, 35); 
                }

                // 2. Inside BOTH of your character drawing loops (single and multi-char), 
                // update the vertex() logic to apply the drift:
                beginShape();
                points.forEach(vertexPoint => {
                    // Your existing baseline layout math
                    let localX = (vertexPoint[0] - 128) * (this.drawnWidth / 256) * xScaleMultiplier;
                    let localY = (vertexPoint[1] - 128) * (this.drawnHeight / 256);
                    
                    // Multi-char layout shift (keep this if you are inside the multi-char loop)
                    // localX += horizontalShiftX; 

                    // --- NEW: Apply the drift based on the stroke's assigned half ---
                    if (this.isTriggeredForExplosion) {
                        let direction = strokeObj.splitSide || 1;
                        localX += splitDrift * direction;
                        localY += splitDrift * direction;
                    }

                    vertex(localX, localY);
                });
                endShape();
            });
        } else {
            // --- Multi-character Word Spacing Layout (Fused Compound Words) ---
            const targetCharBoxWidth = this.drawnWidth / totalChars;
            for (let c = 0; c < totalChars; c++) {
                const currentChar = this.img[c];
                const patternMatch = KanjiCanvas.refPatterns.find(p => p[0] === currentChar);
                const glyphStrokes = patternMatch ? patternMatch[2] : null;

                if (glyphStrokes) {
                    let horizontalShiftX = (-this.drawnWidth / 2) + (targetCharBoxWidth * c) + (targetCharBoxWidth / 2);
                    
                    glyphStrokes.forEach(strokeObj => {
                        let points = strokeObj.path || strokeObj;
                        if (!Array.isArray(points)) return;

                        if (this.isTriggeredForExplosion) {

                        } else if (strokeObj.isAppended) {
                            stroke(120, 120, 120);
                        } else {
                            stroke(this.isSystemSpawn ? 0 : 255); 
                        }

                        beginShape();
                        points.forEach(vertexPoint => {
                            let localX = horizontalShiftX + (vertexPoint[0] - 128) * (targetCharBoxWidth / 256) * xScaleMultiplier;
                            let localY = (vertexPoint[1] - 128) * (this.drawnHeight / 256);
                            vertex(localX, localY);
                        });
                        endShape();
                    });
                }
            }
        }
        pop(); 
    }
}

function isPureKana(text) {
    for (let i = 0; i < text.length; i++) {
        const cp = text.charCodeAt(i);
        if (!((cp >= 0x3040 && cp <= 0x309F) || (cp >= 0x30A0 && cp <= 0x30FF))) {
            return false;
        }
    }
    return true; 
}

async function fetchAndStoreKanjiData(charInput) {
    // 1. Initialize if it doesn't exist yet
    if (!kanjiDataDictionary[charInput]) {
        kanjiDataDictionary[charInput] = [];
    }

    // 2. Prevent duplicate API calls using a custom flag (so we don't block the initial fetch!)
    if (kanjiDataDictionary[charInput].wordsFetched) return;

    const apiUrl = `https://kanjiapi.dev/v1/words/${encodeURIComponent(charInput)}`;
    try {
        const response = await fetch(apiUrl);
        if (!response.ok) return;
        
        const data = await response.json();
        const uniqueCheck = new Set(); 
        
        // Pre-fill the unique check with the existing base readings from the /v1/kanji/ endpoint
        kanjiDataDictionary[charInput].forEach(item => {
            uniqueCheck.add(`${item[0]}_${item[1]}`);
        });

        const newWords = [];

        if (data && data.length > 0) {
            data.forEach(item => {
                const variants = item.variants || [];
                variants.forEach(option => {
                    const word = option.written;
                    const reading = option.pronounced;

                    if (!word || word === charInput) {
                        if (!uniqueCheck.has(`${reading}_`)) {
                            uniqueCheck.add(`${reading}_`);
                            newWords.push([reading, ""]);
                        }
                    } else {
                        if (!word.includes(charInput)) return;
                        if (word.length <= 1) return;
                        if (word.length > 5) return; 
                        if (isPureKana(word)) return;

                        const uniqueKey = `${word}_${reading}`;
                        if (!uniqueCheck.has(uniqueKey)) {
                            uniqueCheck.add(uniqueKey);
                            newWords.push([word, reading]);
                        }
                    } 
                });
            });
        }

        // Combine the existing /kanji readings with the newly fetched /words
        const combinedList = [...kanjiDataDictionary[charInput], ...newWords];

        // Bubble up Hiragana-only readings to the top
        combinedList.sort((a, b) => {
            const aIsHiraganaOnly = isPureKana(a[0]);
            const bIsHiraganaOnly = isPureKana(b[0]);

            if (aIsHiraganaOnly && !bIsHiraganaOnly) return -1;
            if (!aIsHiraganaOnly && bIsHiraganaOnly) return 1;
            return 0;
        });

        // Save the combined list and flag it as fully fetched
        kanjiDataDictionary[charInput] = combinedList;
        kanjiDataDictionary[charInput].wordsFetched = true; 

        console.log(`Saved sorted dictionary data for '${charInput}':`, kanjiDataDictionary[charInput]);

    } catch (error) {
        console.error(`Failed to scrape api words for ${charInput}:`, error);
    }
}

        parseAndAddReadings(data.kun_readings);

        processedReadings.forEach(wordPair => {
            const alreadyExists = kanjiDataDictionary[characterString].some(w => w[0] === wordPair[0] && w[1] === wordPair[1]);
            if (!alreadyExists) {
                kanjiDataDictionary[characterString].push(wordPair);

function resampleStroke(points, numPoints = 32) {
    if (points.length <= 1) return points;
    
    let totalLength = 0;
    for (let i = 1; i < points.length; i++) {
        totalLength += dist(points[i-1][0], points[i-1][1], points[i][0], points[i][1]);
    }
    
    let interval = totalLength / (numPoints - 1);
    let newPoints = [points[0]];
    let currentDist = 0;
    
    for (let i = 1; i < points.length; i++) {
        let d = dist(points[i-1][0], points[i-1][1], points[i][0], points[i][1]);
        while (currentDist + d >= interval) {
            let ratio = (interval - currentDist) / d;
            let x = points[i-1][0] + ratio * (points[i][0] - points[i-1][0]);
            let y = points[i-1][1] + ratio * (points[i][1] - points[i-1][1]);
            newPoints.push([x, y]);
            currentDist -= interval;
        }
        currentDist += d;
    }
    while (newPoints.length < numPoints) newPoints.push(points[points.length - 1]);
    return newPoints;
}

function updateContinuousScaling() {
    if (!selectedBlock || !selectedBlock.body) return;

    // Always maintain horizontal displacement tracking for all blocks
    selectedBlock.dragX(pointerX);

    // CRITICAL GUARD: Only execute gesture scaling if it's a white character we drew!
    if (!selectedBlock.isUserDrawn) {
        return; 
    }

    // ----------------------------------------------------
    // Your smooth continuous scaling logic runs below here safely
    // ----------------------------------------------------
    const objectCenterY = selectedBlock.body.position.y;
    const deltaY = objectCenterY - pointerY;
    const sensitivity = 200; 

    let targetScaleValue = 1.0 + (deltaY / sensitivity);

    const minScaleLimit = 0.4;
    const maxScaleLimit = 2.5;
    targetScaleValue = Math.max(minScaleLimit, Math.min(maxScaleLimit, targetScaleValue));

    let currentScale = selectedBlock.blockScale !== undefined ? selectedBlock.blockScale : (selectedBlock.scale || 1.0);
    
    if (currentScale !== targetScaleValue) {
        let incrementalScaleFactor = targetScaleValue / currentScale;
        
        if (selectedBlock.blockScale !== undefined) selectedBlock.blockScale = targetScaleValue;
        if (selectedBlock.scale !== undefined) selectedBlock.scale = targetScaleValue;
        
        if (selectedBlock.drawnWidth) selectedBlock.drawnWidth *= incrementalScaleFactor;
        if (selectedBlock.drawnHeight) selectedBlock.drawnHeight *= incrementalScaleFactor;
        if (selectedBlock.w) selectedBlock.w *= incrementalScaleFactor;
        if (selectedBlock.h) selectedBlock.h *= incrementalScaleFactor;

        Matter.Body.scale(selectedBlock.body, incrementalScaleFactor, incrementalScaleFactor);
    }
}

                        // --- MODE B: Initialization (Black Block converting to Grey Reading Mode) ---
                        else {

                            }
                            // --- MODE C: Standard Kanji Compound Combination Fallback ---
                            else {
                                const blackText = boxA.img;
                                let orderDetermined = false;
                                let combinedWordPattern = "";

                                let testPatternAsPrefix = blackText + whiteChar;
                                let validPrefixWords = vocabList.filter(item => item[0] && item[0].includes(testPatternAsPrefix));

                                let testPatternAsSuffix = whiteChar + blackText;
                                let validSuffixWords = vocabList.filter(item => item[0].includes(testPatternAsSuffix));

                                if (validPrefixWords.length > 0) {
                                    combinedWordPattern = testPatternAsPrefix;
                                    kanjiDataDictionary[combinedWordPattern] = validPrefixWords;
                                    orderDetermined = true;
                                } else if (validSuffixWords.length > 0) {
                                    combinedWordPattern = testPatternAsSuffix;
                                    kanjiDataDictionary[combinedWordPattern] = validSuffixWords;
                                    orderDetermined = true;

                                if (orderDetermined) {
                                    let baselineWordsBeforeFiltering = kanjiDataDictionary[combinedWordPattern];
                                    let filteredWords = baselineWordsBeforeFiltering.filter(item => item[0] !== combinedWordPattern);

                                    kanjiDataDictionary[combinedWordPattern] = filteredWords;

    // --- 2. CLEAR DISAPPEARING BLOCKS FROM RETRIEVAL MATRIX ---
    if (boxesToRemove.size > 0) {

                points.forEach(vertexPoint => {

                    let localY = (vertexPoint[1] - 128) * (currentBox.drawnHeight / 256);
                    vertex(localX, localY);
                });
                endShape();
            });
            pop();

    }

    // =================================================================
    // START INSERTING HERE: 3. Handle the Timer and Spawning Inside draw()
    // =================================================================
    let loopTime = millis();
    for (let i = boxes.length - 1; i >= 0; i--) {
        let b = boxes[i];
        
        // --- CHANGED: Now waits for 2000ms (2 seconds) ---
        if (b.isTriggeredForExplosion && (loopTime - b.explosionTimerStart > 2000)) {
            
            if (b.jsonStrokes && b.jsonStrokes.length > 0) {
                let bx = b.body.position.x;
                let by = b.body.position.y;
                let bAngle = b.body.angle;
                
                b.jsonStrokes.forEach(singleStroke => {
                    // Calculate the final drifted position so the physical pieces 
                    // spawn exactly where the animation left off
                    let driftDir = singleStroke.splitSide || 1;
                    let localDrift = 35 * driftDir;
                    
                    // Convert local drift to world space using the body's rotation matrix
                    let worldDx = localDrift * cos(bAngle) - localDrift * sin(bAngle);
                    let worldDy = localDrift * sin(bAngle) + localDrift * cos(bAngle);

                    let piece = new SlashedPiece(
                        bx + worldDx, // Spawns shifted outward
                        by + worldDy, // Spawns shifted outward
                        singleStroke, 
                        bAngle, 
                        b.drawnWidth, 
                        b.drawnHeight, 
                        b.scale
                    );
                    slashedPieces.push(piece);
                });
            }

            // Remove it from the world matrix
            if (b.body) {
                Matter.Composite.remove(engine.world, b.body);
            }
            boxes.splice(i, 1);
            console.log("💥 Explosion triggered after 2-second split!");
        }
    } 

    // --- 4. ENGINE SIMULATION & FOREGROUND BOX ENTITIES RENDER ---
    // --- NEW: SIMULATE, DRAW, AND DESPAWN EXPLODED STROKE FRAGMENTS ---
    let currentTime = millis();
    for (let i = slashedPieces.length - 1; i >= 0; i--) {
        let piece = slashedPieces[i];
        
        // If 2 seconds (2000 milliseconds) have passed since spawn time, clear it
        if (currentTime - piece.spawnTime > 2000) {
            if (piece.body) {
                Matter.Composite.remove(engine.world, piece.body);
            }
            slashedPieces.splice(i, 1);
        } else {
            piece.display();
        }
    } 

    // --- START SMOKE EFFECT LOGIC ---
    for (let i = 0; i < boxes.length; i++) {
        // Example inside your p5.js draw loop or update loop
        // --- Inside your loop iterating through boxes ---
        let b = boxes[i]; 

        if (b.isRed && !b.isTriggeredForExplosion) { // Slightly more frequent for "filling"
            // Inside your loop
            let angle = b.body.angle;
            // ... inside your loop 
            let hw = (b.drawnWidth || 50) / 2;
            let hh = (b.drawnHeight || 50) / 2;

            // Shrink the spawn area to be closer to the center (e.g., 50% of the size)
            let shrinkFactor = 0.5; 

            // 1. Pick a random side, but use the shrunk dimensions
            let side = floor(random(4));
            let lx, ly;

            if (side === 0) { lx = random(-hw * shrinkFactor, hw * shrinkFactor); ly = -hh * shrinkFactor; } 
            else if (side === 1) { lx = random(-hw * shrinkFactor, hw * shrinkFactor); ly = hh * shrinkFactor; } 
            else if (side === 2) { lx = -hw * shrinkFactor; ly = random(-hh * shrinkFactor, hh * shrinkFactor); } 
            else { lx = hw * shrinkFactor; ly = random(-hh * shrinkFactor, hh * shrinkFactor); }

            // ... (keep your rotation logic exactly as is)            // Right

            // 2. Rotate the local point (lx, ly) by the body's angle
            let rotatedX = (lx * Math.cos(angle)) - (ly * Math.sin(angle));
            let rotatedY = (lx * Math.sin(angle)) + (ly * Math.cos(angle));

            // 3. Final spawn position
            let spawnX = b.body.position.x + rotatedX;
            let spawnY = b.body.position.y + rotatedY;

            // 5. Create particle
            let smokeColor = [255, 150, 150];  
            let parentScale = b.blockScale || 1.0; 

            // 4. Create particle
            smokeParticles.push(new SmokeParticle(spawnX, spawnY, smokeColor, b.blockScale || 1.0));
        }
    }

    // Update and draw the active smoke particles
    for (let i = smokeParticles.length - 1; i >= 0; i--) {

        if (p.life <= 0) {
            smokeParticles.splice(i, 1);
        } else {
            p.display();
        }
    }
    // --- END SMOKE EFFECT LOGIC ---

    // (Your existing box rendering loop goes immediately below this!)
    // for (let i = 0; i < boxes.length; i++) { ... boxes[i].display(); }

    for (let i = 0; i < boxes.length; i++) { 
        if (boxes[i].isSuspended) {

            Matter.Body.setAngularVelocity(boxes[i].body, 0);
        }
        
        boxes[i].display(); 
    }
    ground.display();

    // --- RENDERING STATIC GREY SIDE WALLS (EXACTLY 5PX) ---
    push();
    fill(130, 135, 136);

    stroke(255, 153, 0);

    sessionsStrokes.forEach(strokeData => {

} 

function getDynamicStrokeBounds() {
    let allPoints = sessionsStrokes.flat().concat(currentStrokePoints);
    if (allPoints.length === 0) return null; 

    let minX = Infinity, maxX = -Infinity;
    let minY = Infinity, maxY = -Infinity;

    allPoints.forEach(pt => {
        if (pt[0] < minX) minX = pt[0]; if (pt[0] > maxX) maxX = pt[0];
        if (pt[1] < minY) minY = pt[1]; if (pt[1] > maxY) maxY = pt[1];
    });

    let padding = 15;
    let rawWidth = maxX - minX;
    let rawHeight = maxY - minY;
    
    let width = Math.max(rawWidth + padding * 2, 40);
    let height = Math.max(rawHeight + padding * 2, 40);
    
    if (rawWidth > rawHeight * 2) {
        height = width; 
        let centerY = minY + rawHeight / 2;
        minY = centerY - height / 2;
        maxY = centerY + height / 2;
    }

    let size = Math.max(width, height);

    return { 
        x: minX - padding, 
        y: minY - padding, 
        width: width, 
        height: height,
        size: size,
        centerX: minX + (maxX - minX) / 2,
        centerY: minY + (maxY - minY) / 2,
        maxY: maxY,
        minY: minY 
    };
} 

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    
    if (leftWall) {

        });

        Matter.Body.setPosition(rightWall, {

            y: windowHeight / 2 
        });
    }
}

let lastGrabTime = 0;
let lastGrabbedBox = null;

function isUiActive(nativeEvent) { 
    if (!nativeEvent) return false;

    if ($(nativeEvent.target).closest('#results-dock').length > 0 || $(nativeEvent.target).closest('#word-popup-overlay').length > 0 || $(nativeEvent.target).closest('#stroke-teaching-popup').length > 0 || $(nativeEvent.target).closest('#global-abort-btn').length > 0) {

            return true;
        }
    }
    return false;
} 

function handleStart(x, y, nativeEvent) {
    if (isUiActive(nativeEvent)) return;

    for (let i = boxes.length - 1; i >= 0; i--) {
        let box = boxes[i];
        if (box.containsPoint(x, y)) {
            
            if (box.isSystemSpawn) {
                let currentTime = millis(); 
                
                if (lastGrabbedBox === box && (currentTime - lastGrabTime) < 500) {
                    clearActiveDrawingSession(); 
                    showWordPopup(box.img);      
                    
                    lastGrabTime = 0;
                    lastGrabbedBox = null;
                    return; 
                } else {
                    lastGrabTime = currentTime;
                    lastGrabbedBox = box;
                }
            }

            activeSuspendedBlock = box;
            box.suspend();
            return; 
        }
    }

    for (let i = boxes.length - 1; i >= 0; i--) {
        if (boxes[i].isSuspended && !boxes[i].hasLanded && Math.abs(y - boxes[i].body.position.y) < 40) {
            activeSuspendedBlock = boxes[i];
            activeSuspendedBlock.dragX(x); 
            return;
        }
    } 

    const dock = document.getElementById('results-dock');

    // Update layout structure string assignment:
    dock.innerHTML = `
        <div class="dock-title-bar">
            <button class="close-btn" onclick="document.getElementById('results-dock').style.display='none';">×</button>
        </div>
        <div class="dock-scroll-container" id="dock-scroll-container-items">
            </div>
    `;
    dock.style.display = 'none';
    
    currentStrokePoints = [[x, y]];
} 

function handleMove(x, y, nativeEvent) {
    if ($('#word-popup-overlay').is(':visible') || $('#results-dock').is(':visible') || $('#stroke-teaching-popup').is(':visible') || $('#global-abort-btn').is(':visible')) {
        if (!nativeEvent) return;
        if ($(nativeEvent.target).closest('#results-dock').length > 0 || $(nativeEvent.target).closest('#word-popup-overlay').length > 0 || $(nativeEvent.target).closest('#stroke-teaching-popup').length > 0 || $(nativeEvent.target).closest('#global-abort-btn').length > 0) {
            return;
        }
    }

    if (activeSuspendedBlock) {
        if (!activeSuspendedBlock.hasLanded) {
            activeSuspendedBlock.dragX(x);
        }
        return;
    }

    if (currentStrokePoints.length === 0) return;
    const lastPoint = currentStrokePoints[currentStrokePoints.length - 1];
    if (lastPoint && dist(x, y, lastPoint[0], lastPoint[1]) < 3) return;
    currentStrokePoints.push([x, y]);
}

function handleEnd() {
    if (activeSuspendedBlock) {
        activeSuspendedBlock.release();
        activeSuspendedBlock = null;
        return;
    }

    if (currentStrokePoints.length === 0) return;
    sessionsStrokes.push(currentStrokePoints);
    currentStrokePoints = [];
    evaluateHandwrittenGestures();
}

    if (isUiActive(e)) return true; 
    if (touches.length === 0) {
        handleStart(mouseX, mouseY, e);

function mouseDragged(e) {
    if (isCuttingMode) {
        return false; // Blocks the drawing inputs from generating paths
    }
    if (isUiActive(e)) return true;
    if (touches.length === 0) {
        handleMove(mouseX, mouseY, e);
    }
} 

function mouseReleased() {
    handleEnd();
}

function touchStarted(e) {
    if (isUiActive(e)) return true; 
    if (touches.length > 0) {
        handleStart(touches[0].x, touches[0].y, e);

    return false;

     if (isCuttingMode) {

    if (touches.length > 0) {
        handleMove(touches[0].x, touches[0].y, e);

function evaluateHandwrittenGestures() {
    let bounds = getDynamicStrokeBounds();
    if (!bounds) return; 

    let processedStrokes = sessionsStrokes.map(stroke => resampleStroke(stroke));

    let normalizedPattern = processedStrokes.map(stroke => {
        return stroke.map(pt => {
            let normX = ((pt[0] - bounds.x) / bounds.size) * 256;
            let normY = ((pt[1] - bounds.y) / bounds.size) * 256;
            return [normX, normY];
        });
    }); 

    KanjiCanvas["recordedPattern_" + BACKEND_ID] = normalizedPattern;
    const candidates = KanjiCanvas.recognize(BACKEND_ID);
    updateFloatingSelectionDock(candidates, bounds);
}

    let currentDrawingSize = Math.max(bounds.width, bounds.height);
    if (currentDrawingSize < 150) {
        let scaleFactor = (150 - currentDrawingSize) / 100; 
        topPos += (scaleFactor * 85); 
    } 

    calculatedLeft = Math.max(10, Math.min(calculatedLeft, windowWidth - finalWidth - 10));
    if (topPos + 110 > windowHeight) {
        topPos = (bounds.minY || 100) - 110 - 15; 
    }

    dock.style.setProperty('left', `${calculatedLeft}px`, 'important');
    dock.style.setProperty('top', `${topPos}px`, 'important'); 

    // --- NEW: RETRO WINDOW DRAG MECHANICS ---
    const dragHandle = document.getElementById('dock-drag-handle');
    let isDragging = false;
    let startX, startY, initialLeft, initialTop;

    function startDrag(clientX, clientY) {
        isDragging = true;
        startX = clientX;
        startY = clientY;
        initialLeft = parseFloat(dock.style.left);
        initialTop = parseFloat(dock.style.top);
    }

    function doDrag(clientX, clientY, rawEvent) {
        if (!isDragging) return;
        
        // SAFE PREVENT: Only stop scrolling behavior if the browser flags it as cancelable
        if (rawEvent && rawEvent.cancelable) {
            rawEvent.preventDefault();
        }

        let deltaX = clientX - startX;
        let deltaY = clientY - startY;
        
        let newLeft = initialLeft + deltaX;
        let newTop = initialTop + deltaY;

        // Keep window cleanly inside viewport limits
        newLeft = Math.max(0, Math.min(newLeft, windowWidth - finalWidth));
        newTop = Math.max(0, Math.min(newTop, windowHeight - 110));

        dock.style.setProperty('left', `${newLeft}px`, 'important');
        dock.style.setProperty('top', `${newTop}px`, 'important');
    }

    function stopDrag() {
        isDragging = false;
    }

    // Touch Event Listeners (Mobile Phones)
    dragHandle.addEventListener('touchstart', (e) => {
        if (e.target.classList.contains('close-btn')) return; // Don't drag if tapping X button
        startDrag(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    // FIXED: Explicitly set passive: false so the browser knows we want to control touch intercepts cleanly
    window.addEventListener('touchmove', (e) => {
        if (isDragging) {
            doDrag(e.touches[0].clientX, e.touches[0].clientY, e);
        }
    }, { passive: false });

    window.addEventListener('touchend', stopDrag, { passive: true });

    // Mouse Event Listeners (Desktop Testing)
    dragHandle.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('close-btn')) return;
        startDrag(e.clientX, e.clientY);
    });

    window.addEventListener('mousemove', (e) => {
        if (isDragging) doDrag(e.clientX, e.clientY, e);
    });

    window.addEventListener('mouseup', stopDrag); 
} 

function clearActiveDrawingSession() {
    sessionsStrokes = [];
    currentStrokePoints = [];
    KanjiCanvas.erase(BACKEND_ID);
    
    const dock = document.getElementById('results-dock');
    dock.style.display = 'none';
    dock.innerHTML = '';
} 

function triggerSelectedBlockSpawn(selectedCharacter) {
    if (sessionsStrokes.length === 0) return;

    let bounds = getDynamicStrokeBounds();
    if (!bounds) return;

    const blockScale = (bounds.size / 380) * 1.5; 

    let matchingPattern = KanjiCanvas.refPatterns.find(p => p[0] === selectedCharacter);
    let jsonStrokes = matchingPattern ? matchingPattern[2] : null;
    let structuralPaths = jsonStrokes && jsonStrokes.length > 0 ? jsonStrokes : sessionsStrokes;

    // User drawn characters drop with custom dimensions and layout paths
    const spawnedBlock = new Rect(
        bounds.centerX, 
        bounds.centerY, 
        sessionsStrokes,    
        selectedCharacter, 
        structuralPaths,   
        blockScale,
        false
    );

    // ADD THIS LINE RIGHT HERE:
    spawnedBlock.isUserDrawn = true;
    
    boxes.push(spawnedBlock); 

    sessionsStrokes = [];
    KanjiCanvas.erase(BACKEND_ID);
    
    const dock = document.getElementById('results-dock');
    dock.style.display = 'none';
    dock.innerHTML = '';
} 

function loadAndDecompressAllPatterns() {
    JSON_FILES.forEach(fileName => {
        fetch(fileName)
            .then(res => { if (!res.ok) throw new Error(); return res.json(); })
            .then(jsonData => {
                for (const char in jsonData) {
                    if (Object.prototype.hasOwnProperty.call(jsonData, char)) {
                        KanjiCanvas.refPatterns.push([char, jsonData[char].length, jsonData[char]]);
                    }
                }
            })
            .catch(err => console.error("Database asset stream error:", err));
    });
}
